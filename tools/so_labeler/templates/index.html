<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S/O Boundary Reviewer</title>
  <link rel="stylesheet" href="/so-labeler/static/style.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">SpeechSummarizer Tool</p>
      <h1>S/O Boundary Reviewer</h1>
      <p class="hero-copy">既存 JSONL から「問診(S)から診察(O)へ切り替わる瞬間」を候補化し、LLM の仮判定を見ながらトリガー句辞書を育てるための画面です。</p>
    </header>

    <section class="card">
      <h2>1. 対象 JSONL を選ぶ</h2>
      <div class="grid cols-3">
        <div class="field span-3">
          <label for="dataDir">data フォルダ</label>
          <input id="dataDir" value="../../data">
        </div>
        <div class="field">
          <label for="startDate">開始日</label>
          <input id="startDate" type="date">
        </div>
        <div class="field">
          <label for="endDate">終了日</label>
          <input id="endDate" type="date">
        </div>
        <div class="field align-end">
          <button id="btnList">jsonl 一覧取得</button>
        </div>
      </div>
      <div class="action-row">
        <button id="btnCheckAll" class="button-secondary">全選択</button>
        <button id="btnUncheckAll" class="button-secondary">全解除</button>
      </div>
      <p id="fileSummary" class="muted"></p>
      <div id="fileList" class="file-list"></div>
    </section>

    <section class="card">
      <h2>2. 境界候補を作る</h2>
      <div class="grid cols-3">
        <div class="field">
          <label for="contextSize">前後文脈件数</label>
          <input id="contextSize" type="number" value="3" min="0">
        </div>
        <div class="field">
          <label for="maxCandidates">1ファイル上限</label>
          <input id="maxCandidates" type="number" value="0" min="0">
        </div>
        <div class="field align-end">
          <button id="btnCandidates">境界候補を作成</button>
        </div>
      </div>
      <div class="summary-grid">
        <div class="summary-box">
          <span class="summary-label">候補数</span>
          <strong id="candidateCount">0</strong>
        </div>
        <div class="summary-box">
          <span class="summary-label">レビュー済み</span>
          <strong id="reviewedCount">0</strong>
        </div>
        <div class="summary-box">
          <span class="summary-label">境界候補</span>
          <strong id="boundaryCount">0</strong>
        </div>
      </div>
      <div id="candidatePreview" class="candidate-preview"></div>
    </section>

    <section class="card">
      <h2>3. LLM で仮判定する</h2>
      <div class="grid cols-3">
        <div class="field">
          <label for="llmMode">判定モード</label>
          <select id="llmMode">
            <option value="ollama">Ollama</option>
            <option value="stub">Stub</option>
          </select>
        </div>
        <div class="field">
          <label for="llmModel">モデル</label>
          <select id="llmModel"></select>
        </div>
        <div class="field">
          <label for="promptId">プロンプト</label>
          <select id="promptId"></select>
        </div>
      </div>
      <div class="grid cols-1">
        <div class="field">
          <label for="llmInfo">接続先</label>
          <input id="llmInfo" disabled>
        </div>
      </div>
      <div class="grid cols-2">
        <div class="field">
          <label for="outputPath">レビュー保存先 JSONL</label>
          <input id="outputPath" value="./output/so_boundary_annotations.jsonl">
        </div>
        <div class="field align-end">
          <button id="btnAnalyze">現在の1件を LLM で仮判定</button>
        </div>
      </div>
      <p id="busyStatus" class="status-line" aria-live="polite"></p>
      <p class="muted">表示中の 1 件だけ LLM に送り、結果を見ながら手作業で修正していく運用です。</p>
    </section>

    <section class="card review-card">
      <div class="review-header">
        <div>
          <h2>4. 1件ずつ確認する</h2>
          <p id="reviewCount" class="muted"></p>
        </div>
        <div class="nav-buttons">
          <button id="btnPrev" class="button-secondary">前へ</button>
          <button id="btnNext" class="button-secondary">次へ</button>
        </div>
      </div>

      <div id="reviewPane" class="review-pane"></div>

      <div class="grid cols-2">
        <div class="field">
          <label for="humanBoundary">この位置で S→O に切り替わる</label>
          <select id="humanBoundary">
            <option value="yes">はい</option>
            <option value="no">いいえ</option>
          </select>
        </div>
        <div class="field">
          <label for="humanTriggerPhrases">辞書に残すキーワード/句</label>
          <input id="humanTriggerPhrases" placeholder="例: 見ていきますね, お口開けて">
        </div>
      </div>

      <div class="field">
        <label for="humanNote">修正メモ</label>
        <input id="humanNote" placeholder="例: ここは診察開始だが trigger は次発話の『喉見ます』の方が適切">
      </div>

      <div class="action-row">
        <button id="btnApplySuggestion" class="button-secondary">LLM の句を反映</button>
        <button id="btnSaveReview">この 1 件を保存</button>
      </div>
    </section>

    <section class="card">
      <h2>5. トリガー辞書を書き出す</h2>
      <div class="grid cols-3">
        <div class="field">
          <label for="annotationPath">教師データ JSONL</label>
          <input id="annotationPath" value="./output/so_boundary_annotations.jsonl">
        </div>
        <div class="field">
          <label for="rulesPath">辞書 JSON</label>
          <input id="rulesPath" value="./output/so_boundary_rules.json">
        </div>
        <div class="field">
          <label for="minCount">最小出現数</label>
          <input id="minCount" type="number" value="1" min="1">
        </div>
      </div>
      <div class="action-row">
        <button id="btnExtract">辞書を書き出す</button>
      </div>
      <pre id="rulesPreview"></pre>
    </section>
  </div>
  <script src="/so-labeler/static/app.js"></script>
</body>
</html>
