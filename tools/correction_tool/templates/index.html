<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>誤変換補正ツール</title>
  <link rel="stylesheet" href="/analysis-tools/correction-tool/static/style.css?v=20260326e">
</head>
<body>
  <div class="page">
    <header class="hero">
      <a href="/analysis-tools" class="back-link">分析ツールへ戻る</a>
      <h1>誤変換補正ツール</h1>
      <p>診察会話 JSONL を見ながら、ASR モデル別の誤変換辞書を育てます。LLM の候補抽出と手入力の両方に対応します。</p>
    </header>

    <section class="card review-card">
      <div class="review-header">
        <div>
          <h2>認識結果一覧</h2>
          <p id="sessionCount" class="muted"></p>
        </div>
        <div class="nav-buttons">
          <div class="inline-field">
            <input id="targetDate" type="date">
          </div>
          <select id="sessionPatientSelect" class="session-patient-select" aria-label="患者選択">
            <option value="">患者選択</option>
          </select>
          <button id="btnPrev" class="button-secondary">前へ</button>
          <button id="btnNext" class="button-secondary">次へ</button>
        </div>
      </div>
      <p id="busyStatus" class="status-line" aria-live="polite"></p>
      <div class="grid cols-2 compact-grid">
        <div class="field"><label>辞書スコープ</label><select id="ruleScope"></select></div>
      </div>
      <div id="sessionMeta" class="muted"></div>
      <p class="muted">表示テキストをクリックするとその元発話を誤変換欄へ入れます。テキストの一部をドラッグ選択してマウスを離すと、選択部分だけを誤変換欄へ入れます。</p>
      <div id="transcriptPane" class="transcript-pane"></div>
      <div class="grid cols-2">
        <div class="field">
          <label>誤変換</label>
          <input id="wrongText" placeholder="例: 席">
        </div>
        <div class="field">
          <label>補正後</label>
          <input id="correctText" placeholder="例: 咳">
        </div>
      </div>
      <div class="action-row">
        <button id="btnSaveRule">この辞書を追加</button>
        <button id="btnRestoreRaw" class="button-secondary">補正前に戻す</button>
        <button id="btnPreview" class="button-secondary">補正</button>
      </div>
      <p id="selectionMeta" class="muted"></p>
      <section class="panel">
        <h3>LLM 候補抽出</h3>
        <div class="grid cols-2 compact-grid">
          <div class="field"><label>LLM モデル</label><select id="llmModel"></select></div>
          <div class="field"><label>プロンプト</label><select id="promptId"></select></div>
        </div>
        <div class="action-row">
          <button id="btnSuggest" class="button-secondary">LLM 候補抽出</button>
        </div>
        <div id="suggestions" class="list"></div>
      </section>
    </section>

    <section class="card">
      <h2>現在の辞書</h2>
      <div id="rulesList" class="rules-list"></div>
    </section>
  </div>
  <script>
    window.addEventListener('error', function (event) {
      var el = document.getElementById('busyStatus');
      if (el && event && event.message) {
        el.textContent = 'JavaScript error: ' + event.message;
      }
    });
  </script>
  <script src="/analysis-tools/correction-tool/static/app.js?v=20260326e"></script>
</body>
</html>
